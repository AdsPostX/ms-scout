services:
  - type: worker          # Long-running background process — NOT a web server or static site.
    name: scout-bot       # Scout: MomentScience Offer Intelligence Bot (Slack Socket Mode)
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scout_bot.py

    envVars:
      # Slack
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false

      # Anthropic
      - key: ANTHROPIC_API_KEY
        sync: false

      # ClickHouse
      - key: CH_HOST
        sync: false
      - key: CH_USER
        sync: false
      - key: CH_PASSWORD
        sync: false
      - key: CH_DATABASE
        sync: false

      # Affiliate networks (used by offer_scraper.py — set if running digest on Render)
      - key: IMPACT_SID
        sync: false
      - key: IMPACT_TOKEN
        sync: false
      - key: FLEXOFFERS_API_KEY
        sync: false
      - key: FLEXOFFERS_DOMAIN_ID
        sync: false
      - key: MAXBOUNTY_EMAIL
        sync: false
      - key: MAXBOUNTY_PASSWORD
        sync: false

      # Scout config
      - key: SCOUT_DIGEST_CHANNEL
        sync: false
      - key: ADOPS_NOTIFY_USER_ID
        sync: false
      - key: MS_PLATFORM_URL
        sync: false
      - key: GIPHY_API_KEY
        sync: false
      - key: PULSE_CHANNEL
        sync: false
